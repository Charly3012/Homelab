services:
  rstudio:
    image: rocker/verse:4
    container_name: rstudio_server
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - PASSWORD=rstudio
      - USERID=${UID}
      - GROUPID=${GID}
    volumes:
      - ./.rstudio_config:/home/rstudio/.config/rstudio
      - ./workspace:/home/rstudio/workspace
      - ./other_dir:/other_dir
